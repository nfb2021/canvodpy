<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>canvodpy — Processing Pipeline</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #000000;
      color: #E1E6B9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: 'Fira Code', ui-monospace, monospace;
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ABC8A4;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: clamp(1.4rem, 2vw + 0.6rem, 1.9rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #E1E6B9;
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">canvodpy · Processing Pipeline</p>
    <h1>From GNSS signal to VOD grid</h1>

    <!--
      Coordinate map
      ─────────────────────────────────────────────────────────
      Band            y     h     node_y  node_h
      ACQUISITION     28    76    42      44
      PREPROCESSING  120   196   134/198/262  50
      VERSIONED STR  332    68   346     48
      VOD RETRIEVAL  416   128   430/490  44/52
      OUTPUT         560    76   574     48
      Legend               ~652

      Acquisition nodes (w=128, h=44)  —  6 across, 25px gap
      SP3    x=53   cx=117
      R304   x=206  cx=270
      R211   x=359  cx=423
      R305   x=512  cx=576
      NMEA   x=665  cx=729
      SBF    x=818  cx=882

      Preprocessing
      Left track  cx=240:  PARSE(y=134) AUX(y=198) SCS(y=262)  w=200
      Right track cx=760:  DIRECT(y=198)                        w=200

      Storage   ICE  cx=500  x=375 w=250 y=346 h=48
      VOD       PAIR cx=500  x=300 w=400 y=430 h=44
                TAU  cx=500  x=140 w=720 y=488 h=52  (wide for formula)
      Output    OUT  cx=200  x=76  w=248 y=574 h=48
                HGRID cx=500 x=376 w=248 y=574 h=48
                ASSIGN cx=800 x=676 w=248 y=574 h=48
      ─────────────────────────────────────────────────────────
    -->

    <svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
          <polygon points="0 0,7 2.5,0 5" fill="#ABC8A4"/>
        </marker>
        <marker id="arr-dim" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
          <polygon points="0 0,7 2.5,0 5" fill="#6d8f6f"/>
        </marker>
        <marker id="arr-accent" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
          <polygon points="0 0,7 2.5,0 5" fill="#C4D7A4"/>
        </marker>
      </defs>

      <rect width="1000" height="660" fill="#000000"/>

      <!-- ═══════════════════════════════════════════════════════
           BANDS
           ═══════════════════════════════════════════════════════ -->

      <!-- ACQUISITION -->
      <rect x="24" y="28" width="952" height="76" rx="8"
            fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="40" y="38" fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace"
            font-weight="500" letter-spacing="0.18em">PARSING</text>

      <!-- PREPROCESSING  (two tracks inside) -->
      <rect x="24" y="120" width="952" height="196" rx="8"
            fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="40" y="131" fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace"
            font-weight="500" letter-spacing="0.18em">PREPROCESSING</text>

      <!-- Track divider — vertical hairline in mid-band -->
      <line x1="500" y1="134" x2="500" y2="302"
            stroke="rgba(55,93,59,0.30)" stroke-width="0.8" stroke-dasharray="3,4"/>

      <!-- Track labels (in band header area, above first nodes) -->
      <text x="240" y="130" fill="#6d8f6f" font-size="7" font-family="'Fira Code',monospace"
            font-weight="500" letter-spacing="0.14em" text-anchor="middle">OBSERVATION PATH</text>
      <text x="760" y="130" fill="#6d8f6f" font-size="7" font-family="'Fira Code',monospace"
            font-weight="500" letter-spacing="0.14em" text-anchor="middle">BINARY PATH</text>

      <!-- VERSIONED STORAGE -->
      <rect x="24" y="332" width="952" height="68" rx="8"
            fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="40" y="342" fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace"
            font-weight="500" letter-spacing="0.18em">VERSIONED ZARR STORAGE</text>

      <!-- VOD RETRIEVAL -->
      <rect x="24" y="416" width="952" height="132" rx="8"
            fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="40" y="427" fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace"
            font-weight="500" letter-spacing="0.18em">VOD RETRIEVAL</text>

      <!-- OUTPUT -->
      <rect x="24" y="564" width="952" height="72" rx="8"
            fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="40" y="572" fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace"
            font-weight="500" letter-spacing="0.18em">OUTPUT</text>

      <!-- ═══════════════════════════════════════════════════════
           ARROWS  (drawn before nodes)
           ═══════════════════════════════════════════════════════ -->

      <!--
        Parsing band → preprocessing
        RINEX/NMEA fan into VALIDATE top (240,138).
        SP3 goes direct to INTERP (240,198) — ephemeris, no schema validation needed.
        SBF fans into DIRECT top (760,198).

        Left track nodes (cx=240, w=200, h=44, gap=16):
          VALIDATE  y=138  bottom=182
          INTERP    y=198  bottom=242
          SCS       y=258  bottom=302
      -->

      <!-- SP3 (117,86) → INTERP (237,198) — ephemeris bypasses obs validation -->
      <line x1="117" y1="86" x2="237" y2="198"
            stroke="#ABC8A4" stroke-width="0.9" opacity="0.65" marker-end="url(#arr)"/>

      <!-- RINEX304 (270,86) → VALIDATE (240,138) -->
      <line x1="270" y1="86" x2="241" y2="138"
            stroke="#ABC8A4" stroke-width="0.9" opacity="0.75" marker-end="url(#arr)"/>

      <!-- RINEX211 (423,86) → VALIDATE (244,138) -->
      <line x1="423" y1="86" x2="244" y2="138"
            stroke="#ABC8A4" stroke-width="0.9" opacity="0.70" marker-end="url(#arr)"/>

      <!-- RINEX305 (576,86) → VALIDATE (247,138) — bent at y=118 -->
      <polyline points="576,86 576,118 249,118 249,138" fill="none"
                stroke="#ABC8A4" stroke-width="0.9" opacity="0.60" marker-end="url(#arr)"/>

      <!-- NMEA (729,86) → VALIDATE (252,138) — bent at y=116 -->
      <polyline points="729,86 729,116 252,116 252,138" fill="none"
                stroke="#ABC8A4" stroke-width="0.9" opacity="0.55" marker-end="url(#arr)"/>

      <!-- SBF (882,86) → DIRECT (760,198) -->
      <line x1="882" y1="86" x2="762" y2="198"
            stroke="#ABC8A4" stroke-width="0.9" opacity="0.75" marker-end="url(#arr)"/>

      <!-- VALIDATE (240,182) → INTERP (240,198) -->
      <line x1="240" y1="182" x2="240" y2="197"
            stroke="#C4D7A4" stroke-width="1.1" marker-end="url(#arr-accent)"/>

      <!-- INTERP (240,242) → SCS (240,258) — straight down -->
      <line x1="240" y1="242" x2="240" y2="257"
            stroke="#C4D7A4" stroke-width="1.1" marker-end="url(#arr-accent)"/>

      <!-- SCS (240,302) → ICE (500,346) — converge to center -->
      <line x1="240" y1="302" x2="498" y2="346"
            stroke="#C4D7A4" stroke-width="1.1" marker-end="url(#arr-accent)"/>

      <!-- DIRECT (760,248) → ICE (500,346) — converge to center -->
      <line x1="760" y1="248" x2="502" y2="346"
            stroke="#C4D7A4" stroke-width="1.1" marker-end="url(#arr-accent)"/>

      <!-- ICE (500,394) → PAIR (500,430) — straight down -->
      <line x1="500" y1="394" x2="500" y2="430"
            stroke="#C4D7A4" stroke-width="1.2" marker-end="url(#arr-accent)"/>

      <!-- PAIR (500,474) → TAU (500,490) — straight down -->
      <line x1="500" y1="474" x2="500" y2="490"
            stroke="#C4D7A4" stroke-width="1.2" marker-end="url(#arr-accent)"/>

      <!-- TAU (500,542) → OUT (200,574) — diagonal to output -->
      <line x1="500" y1="542" x2="202" y2="574"
            stroke="#C4D7A4" stroke-width="1.1" marker-end="url(#arr-accent)"/>

      <!-- OUT right (324,598) → HGRID left (376,598) — horizontal -->
      <line x1="324" y1="598" x2="374" y2="598"
            stroke="#C4D7A4" stroke-width="1.1" marker-end="url(#arr-accent)"/>

      <!-- HGRID right (624,598) → ASSIGN left (676,598) — horizontal -->
      <line x1="624" y1="598" x2="674" y2="598"
            stroke="#C4D7A4" stroke-width="1.1" marker-end="url(#arr-accent)"/>

      <!-- ═══════════════════════════════════════════════════════
           NODES
           ═══════════════════════════════════════════════════════ -->

      <!-- ── ACQUISITION  (w=128, h=44) ── -->

      <!-- SP3 Ephemerides -->
      <rect x="53" y="42" width="128" height="44" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="117" y="61" fill="#183128" font-size="9.5" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">SP3 Ephemerides</text>
      <text x="117" y="78" fill="#375D3B" font-size="7.5"
            font-family="'Fira Code',monospace" text-anchor="middle">ESA / NASA</text>

      <!-- RINEX v3.04 -->
      <rect x="206" y="42" width="128" height="44" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="270" y="61" fill="#183128" font-size="9.5" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">RINEX v3.04</text>
      <text x="270" y="78" fill="#375D3B" font-size="7.5"
            font-family="'Fira Code',monospace" text-anchor="middle">SNR · PR · Phase · Doppler</text>

      <!-- RINEX v2.11 -->
      <rect x="359" y="42" width="128" height="44" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="423" y="61" fill="#183128" font-size="9.5" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">RINEX v2.11</text>
      <text x="423" y="78" fill="#375D3B" font-size="7.5"
            font-family="'Fira Code',monospace" text-anchor="middle">SNR · PR · Phase · Doppler</text>

      <!-- RINEX v3.05 Stripped -->
      <rect x="512" y="42" width="128" height="44" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="576" y="61" fill="#183128" font-size="9.5" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">RINEX v3.05</text>
      <text x="576" y="78" fill="#375D3B" font-size="7.5"
            font-family="'Fira Code',monospace" text-anchor="middle">SNR only · stripped</text>

      <!-- NMEA v4.00 -->
      <rect x="665" y="42" width="128" height="44" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="729" y="61" fill="#183128" font-size="9.5" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">NMEA v4.00</text>
      <text x="729" y="78" fill="#375D3B" font-size="7.5"
            font-family="'Fira Code',monospace" text-anchor="middle">GSV · RMC · GGA</text>

      <!-- Septentrio SBF -->
      <rect x="818" y="42" width="128" height="44" rx="6"
            fill="#E1E6B9" stroke="#375D3B" stroke-width="1.3"/>
      <text x="882" y="61" fill="#183128" font-size="9.5" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">Septentrio SBF</text>
      <text x="882" y="78" fill="#375D3B" font-size="7.5"
            font-family="'Fira Code',monospace" text-anchor="middle">0.25 dB · binary</text>

      <!-- ── PREPROCESSING  (w=200, h=44, gap=16) ── -->

      <!-- VALIDATE (y=138) -->
      <rect x="140" y="138" width="200" height="44" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="240" y="160" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">Data Validation</text>
      <text x="240" y="174" fill="#375D3B" font-size="8"
            font-family="'Fira Code',monospace" text-anchor="middle">Pydantic schema checks</text>

      <!-- INTERP (y=198) -->
      <rect x="140" y="198" width="200" height="44" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="240" y="220" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">Hermite Interpolation</text>
      <text x="240" y="234" fill="#375D3B" font-size="8"
            font-family="'Fira Code',monospace" text-anchor="middle">Satellite Ephemeris</text>

      <!-- SCS (y=258) -->
      <rect x="140" y="258" width="200" height="44" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="240" y="280" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">ECEF → Spherical</text>
      <text x="240" y="294" fill="#375D3B" font-size="8"
            font-family="'Fira Code',monospace" text-anchor="middle">θ, φ per epoch × SID</text>

      <!-- DIRECT -->
      <rect x="660" y="198" width="200" height="50" rx="6"
            fill="#E1E6B9" stroke="#375D3B" stroke-width="1.3"/>
      <text x="760" y="220" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">Embedded Geometry</text>
      <text x="760" y="239" fill="#375D3B" font-size="8"
            font-family="'Fira Code',monospace" text-anchor="middle">θ, φ from firmware</text>

      <!-- ── VERSIONED STORAGE  (focal) ── -->

      <!-- ICE -->
      <rect x="375" y="346" width="250" height="48" rx="6"
            fill="#E1E6B9" stroke="#375D3B" stroke-width="1.8"/>
      <text x="500" y="368" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">Observation Data Icechunk Store</text>
      <text x="500" y="385" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">epoch × SID · rich metadata</text>

      <!-- ── VOD RETRIEVAL ── -->

      <!-- PAIR -->
      <rect x="300" y="430" width="400" height="44" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="500" y="452" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">Canopy / Reference Pairing</text>
      <text x="500" y="466" fill="#375D3B" font-size="8"
            font-family="'Fira Code',monospace" text-anchor="middle">align by epoch and SID</text>

      <!-- TAU  (extra wide, formula node) -->
      <rect x="140" y="490" width="720" height="52" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="500" y="511" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">VOD Retrieval</text>
      <!-- sublabel -->
      <text x="500" y="533" fill="#375D3B" font-size="8.5" font-weight="400"
            font-family="'Fira Code',monospace" text-anchor="middle">VOD(epoch, SID, θ, φ)</text>

      <!-- ── OUTPUT ── -->

      <!-- OUT (VOD Dataset) — slightly rounder rx to suggest it's a result node -->
      <rect x="76" y="574" width="248" height="48" rx="20"
            fill="#E1E6B9" stroke="#375D3B" stroke-width="1.4"/>
      <text x="200" y="595" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">VOD Icechunk Store</text>
      <text x="200" y="613" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">epoch × cell · rich metadata</text>

      <!-- HGRID -->
      <rect x="376" y="574" width="248" height="48" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="500" y="595" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">Hemispheric Grid</text>
      <text x="500" y="613" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">equal-area · equal-angle · geodesic</text>

      <!-- ASSIGN -->
      <rect x="676" y="574" width="248" height="48" rx="6"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="800" y="595" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">KDTree Assignment</text>
      <text x="800" y="613" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">O(n log m)</text>

      <!-- ═══════════════════════════════════════════════════════
           LEGEND
           ═══════════════════════════════════════════════════════ -->
      <line x1="24" y1="646" x2="976" y2="646" stroke="rgba(225,230,185,0.08)" stroke-width="0.8"/>

      <rect x="24" y="652" width="9" height="6" rx="1.5"
            fill="#E1E6B9" stroke="#375D3B" stroke-width="1.5"/>
      <text x="38" y="657" fill="#6d8f6f" font-size="7.5"
            font-family="'Space Grotesk',sans-serif">focal / result</text>

      <rect x="130" y="652" width="9" height="6" rx="1.5"
            fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="144" y="657" fill="#6d8f6f" font-size="7.5"
            font-family="'Space Grotesk',sans-serif">process node</text>

      <line x1="240" y1="655" x2="264" y2="655" stroke="#ABC8A4"
            stroke-width="0.9" marker-end="url(#arr)"/>
      <text x="270" y="657" fill="#6d8f6f" font-size="7.5"
            font-family="'Space Grotesk',sans-serif">data input</text>

      <line x1="360" y1="655" x2="384" y2="655" stroke="#C4D7A4"
            stroke-width="1.1" marker-end="url(#arr-accent)"/>
      <text x="390" y="657" fill="#6d8f6f" font-size="7.5"
            font-family="'Space Grotesk',sans-serif">main pipeline flow</text>

      <line x1="520" y1="652" x2="530" y2="652" stroke="rgba(55,93,59,0.40)"
            stroke-width="0.8" stroke-dasharray="3,3"/>
      <text x="536" y="657" fill="#6d8f6f" font-size="7.5"
            font-family="'Space Grotesk',sans-serif">track boundary</text>

    </svg>
  </div>
</body>
</html>
