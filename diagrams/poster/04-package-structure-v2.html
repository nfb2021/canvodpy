<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>canvodpy — Package Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #000000;
      color: #E1E6B9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: 'Fira Code', ui-monospace, monospace;
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ABC8A4;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: clamp(1.4rem, 2vw + 0.6rem, 1.9rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #E1E6B9;
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 960px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">canvodpy · Package Architecture</p>
    <h1>Monorepo overview</h1>

    <!--
      Coordinate map  (node positions — all heights 60px, bands 88px)
      Band y  / node top y  / node center y  / node bottom y

      ORCHESTRATION  band=36   node y=50   center=(550,80)   bottom=110
      DATA I/O       band=140  node y=154  center y=184      bottom=214
      PERSISTENCE    band=244  node y=258  center y=288      bottom=318
      COMPUTATION    band=348  node y=362  center y=392      bottom=422
      PRESENTATION   band=452  node y=466  center y=496      bottom=526
      FOUNDATION     band=556  node y=570  center y=600      bottom=630

      Node x-centers (spacing = (1100 - n*220) / (n+1)):
        IO / COMPUTE (3 nodes, gap=110):  220  550  880
        PERSIST / FOUND (2 nodes, gap=220): 330  770
        ORCH / PRESENT  (1 node):           550
    -->

    <svg viewBox="0 0 1100 650" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
          <polygon points="0 0,7 2.5,0 5" fill="#ABC8A4"/>
        </marker>
        <marker id="arr-dim" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
          <polygon points="0 0,7 2.5,0 5" fill="#6d8f6f"/>
        </marker>
      </defs>

      <!-- Page background -->
      <rect width="1100" height="650" fill="#000000"/>

      <!-- ═══════════════════════════════════════════════════
           LAYER BANDS  (x=28  w=1044  rx=8)
           ═══════════════════════════════════════════════════ -->

      <rect x="28" y="36"  width="1044" height="88" rx="8" fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="44" y="56"  fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace" font-weight="500" letter-spacing="0.18em">ORCHESTRATION</text>

      <rect x="28" y="140" width="1044" height="88" rx="8" fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="44" y="160" fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace" font-weight="500" letter-spacing="0.18em">DATA I/O</text>

      <rect x="28" y="244" width="1044" height="88" rx="8" fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="44" y="264" fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace" font-weight="500" letter-spacing="0.18em">PERSISTENCE</text>

      <rect x="28" y="348" width="1044" height="88" rx="8" fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="44" y="368" fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace" font-weight="500" letter-spacing="0.18em">COMPUTATION</text>

      <rect x="28" y="452" width="1044" height="88" rx="8" fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="44" y="472" fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace" font-weight="500" letter-spacing="0.18em">PRESENTATION</text>

      <rect x="28" y="556" width="1044" height="88" rx="8" fill="rgba(24,49,40,0.45)" stroke="rgba(55,93,59,0.55)" stroke-width="1"/>
      <text x="44" y="576" fill="#ABC8A4" font-size="7" font-family="'Fira Code',monospace" font-weight="500" letter-spacing="0.18em">FOUNDATION</text>

      <!-- ═══════════════════════════════════════════════════
           ARROWS — drawn before nodes so nodes sit on top
           ═══════════════════════════════════════════════════ -->

      <!--
        canvodpy → all directly-managed packages
        Start: (550, 110) — canvodpy bottom-center
        End:   top-center of each target node
        Solid, thin, muted — opacity fades slightly for longer arrows
      -->

      <!-- → readers  (550,110)→(220,154) -->
      <line x1="550" y1="110" x2="222" y2="154" stroke="#ABC8A4" stroke-width="0.9" opacity="0.70" marker-end="url(#arr)"/>
      <!-- → auxiliary (550,110)→(550,154) straight down -->
      <line x1="550" y1="110" x2="550" y2="154" stroke="#ABC8A4" stroke-width="0.9" opacity="0.70" marker-end="url(#arr)"/>
      <!-- → naming   (550,110)→(880,154) -->
      <line x1="550" y1="110" x2="878" y2="154" stroke="#ABC8A4" stroke-width="0.9" opacity="0.70" marker-end="url(#arr)"/>

      <!-- → store    (550,110)→(330,258) -->
      <line x1="550" y1="110" x2="332" y2="258" stroke="#ABC8A4" stroke-width="0.9" opacity="0.55" marker-end="url(#arr)"/>
      <!-- → storemeta(550,110)→(770,258) -->
      <line x1="550" y1="110" x2="768" y2="258" stroke="#ABC8A4" stroke-width="0.9" opacity="0.55" marker-end="url(#arr)"/>

      <!-- → vod      (550,110)→(220,362) -->
      <line x1="550" y1="110" x2="222" y2="362" stroke="#ABC8A4" stroke-width="0.9" opacity="0.45" marker-end="url(#arr)"/>
      <!-- → grids    (550,110)→(550,362) straight down -->
      <line x1="550" y1="110" x2="550" y2="362" stroke="#ABC8A4" stroke-width="0.9" opacity="0.45" marker-end="url(#arr)"/>
      <!-- → ops      (550,110)→(880,362) -->
      <line x1="550" y1="110" x2="878" y2="362" stroke="#ABC8A4" stroke-width="0.9" opacity="0.45" marker-end="url(#arr)"/>

      <!-- → viz      (550,110)→(550,466) straight down -->
      <line x1="550" y1="110" x2="550" y2="466" stroke="#ABC8A4" stroke-width="0.9" opacity="0.38" marker-end="url(#arr)"/>

      <!--
        Internal dependencies (dashed)
        Routed to use natural edge alignment where possible
      -->

      <!-- auxiliary → readers: horizontal at y=184 (aux left=440 → readers right=330) -->
      <line x1="440" y1="184" x2="332" y2="184"
            stroke="#6d8f6f" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dim)"/>

      <!-- store → grids: vertical at x=440 (store right=440 = grids left=440) -->
      <line x1="440" y1="318" x2="440" y2="362"
            stroke="#6d8f6f" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dim)"/>

      <!-- ops → grids: horizontal at y=392 (ops left=770 → grids right=660) -->
      <line x1="770" y1="392" x2="662" y2="392"
            stroke="#6d8f6f" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dim)"/>

      <!-- grids → utils: diagonal (grids bottom=550,422 → utils top=330,570) -->
      <line x1="520" y1="422" x2="340" y2="570"
            stroke="#6d8f6f" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dim)" opacity="0.75"/>

      <!-- readers → utils: diagonal (readers bottom=220,214 → utils top=330,570) -->
      <line x1="228" y1="214" x2="316" y2="570"
            stroke="#6d8f6f" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dim)" opacity="0.65"/>

      <!-- storemeta → utils: long diagonal (storemeta bottom=770,318 → utils top-right=440,570) -->
      <line x1="740" y1="318" x2="442" y2="570"
            stroke="#6d8f6f" stroke-width="0.8" stroke-dasharray="5,3" marker-end="url(#arr-dim)" opacity="0.50"/>

      <!-- ═══════════════════════════════════════════════════
           NODES
           ═══════════════════════════════════════════════════ -->

      <!-- ORCHESTRATION ── canvodpy (focal: accent border) -->
      <rect x="440" y="50" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#375D3B" stroke-width="1.8"/>
      <text x="550" y="77" fill="#183128" font-size="13" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvodpy</text>
      <text x="550" y="96" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">orchestrator</text>

      <!-- DATA I/O ── canvod-readers  x=110  center=220 -->
      <rect x="110" y="154" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="220" y="180" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-readers</text>
      <text x="220" y="199" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">RINEX / SBF / NMEA</text>

      <!-- DATA I/O ── canvod-auxiliary  x=440  center=550 -->
      <rect x="440" y="154" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="550" y="180" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-auxiliary</text>
      <text x="550" y="199" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">SP3 ephemerides</text>

      <!-- DATA I/O ── canvod-virtualiconvname  x=770  center=880 -->
      <rect x="770" y="154" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="880" y="176" fill="#183128" font-size="10" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-virtualiconvname</text>
      <text x="880" y="199" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">filename convention</text>

      <!-- PERSISTENCE ── canvod-store  x=220  center=330 -->
      <rect x="220" y="258" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="330" y="284" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-store</text>
      <text x="330" y="303" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">Icechunk / Zarr</text>

      <!-- PERSISTENCE ── canvod-store-metadata  x=660  center=770 -->
      <rect x="660" y="258" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="770" y="280" fill="#183128" font-size="10" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-store-metadata</text>
      <text x="770" y="303" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">DataCite / ACDD / STAC</text>

      <!-- COMPUTATION ── canvod-vod  x=110  center=220 -->
      <rect x="110" y="362" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="220" y="388" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-vod</text>
      <text x="220" y="407" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">tau-omega model</text>

      <!-- COMPUTATION ── canvod-grids  x=440  center=550 -->
      <rect x="440" y="362" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="550" y="388" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-grids</text>
      <text x="550" y="407" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">hemispheric grids</text>

      <!-- COMPUTATION ── canvod-ops  x=770  center=880 -->
      <rect x="770" y="362" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="880" y="388" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-ops</text>
      <text x="880" y="407" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">preprocessing pipeline</text>

      <!-- PRESENTATION ── canvod-viz  x=440  center=550 -->
      <rect x="440" y="466" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="550" y="492" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-viz</text>
      <text x="550" y="511" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">2D polar / 3D interactive</text>

      <!-- FOUNDATION ── canvod-utils (accent border: shared foundation)  x=220  center=330 -->
      <rect x="220" y="570" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#375D3B" stroke-width="1.5"/>
      <text x="330" y="596" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-utils</text>
      <text x="330" y="615" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">config / shared tooling</text>

      <!-- FOUNDATION ── canvod-audit  x=660  center=770 -->
      <rect x="660" y="570" width="220" height="60" rx="6" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="770" y="596" fill="#183128" font-size="11" font-weight="600"
            font-family="'Space Grotesk',sans-serif" text-anchor="middle">canvod-audit</text>
      <text x="770" y="615" fill="#375D3B" font-size="8.5"
            font-family="'Fira Code',monospace" text-anchor="middle">three-tier verification</text>

      <!-- ═══════════════════════════════════════════════════
           LEGEND
           ═══════════════════════════════════════════════════ -->
      <line x1="28" y1="644" x2="1072" y2="644" stroke="rgba(225,230,185,0.08)" stroke-width="0.8"/>

      <rect x="28" y="649" width="9" height="6" rx="1.5" fill="#E1E6B9" stroke="#375D3B" stroke-width="1.5"/>
      <text x="42" y="655" fill="#6d8f6f" font-size="7.5" font-family="'Space Grotesk',sans-serif">focal / shared</text>

      <rect x="130" y="649" width="9" height="6" rx="1.5" fill="#E1E6B9" stroke="#ABC8A4" stroke-width="1"/>
      <text x="144" y="655" fill="#6d8f6f" font-size="7.5" font-family="'Space Grotesk',sans-serif">package</text>

      <line x1="220" y1="652" x2="242" y2="652" stroke="#ABC8A4" stroke-width="0.9" marker-end="url(#arr)"/>
      <text x="248" y="655" fill="#6d8f6f" font-size="7.5" font-family="'Space Grotesk',sans-serif">orchestrates</text>

      <line x1="350" y1="652" x2="372" y2="652" stroke="#6d8f6f" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-dim)"/>
      <text x="378" y="655" fill="#6d8f6f" font-size="7.5" font-family="'Space Grotesk',sans-serif">internal dependency</text>

    </svg>
  </div>
</body>
