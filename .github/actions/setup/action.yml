name: "Setup uv"
description: "Install uv and sync workspace dependencies"
runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        version: "0.10.3"
        enable-cache: true

    - name: Set up Python
      shell: bash
      run: uv python install

    - name: Sync workspace
      shell: bash
      run: uv sync --all-extras --dev
