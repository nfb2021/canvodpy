name: Publish to PyPI

# Trigger only on production release tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'  # e.g., v0.1.0, v1.2.3
      # Excludes pre-release tags (beta, alpha, rc)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write  # Required for OIDC authentication

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi  # GitHub environment for protection rules

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Build all packages
        run: |
          rm -rf dist/
          mkdir -p dist/

          # Build each package, collecting output into root dist/
          for pkg in \
            packages/canvod-readers \
            packages/canvod-auxiliary \
            packages/canvod-grids \
            packages/canvod-store \
            packages/canvod-store-metadata \
            packages/canvod-utils \
            packages/canvod-viz \
            packages/canvod-vod \
            packages/canvod-ops \
            packages/canvod-virtualiconvname \
            packages/canvod-audit \
            canvodpy; do
            echo "Building $pkg..."
            uv build --package "$(basename $pkg)" --out-dir dist/
          done

          echo "Built packages:"
          ls -lh dist/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          verbose: true
          skip_existing: true
