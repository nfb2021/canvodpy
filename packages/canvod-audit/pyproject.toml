[project]
name = "canvod-audit"
version = "0.3.0"
description = "Internal verification and regression testing suite for canVODpy pipelines"
readme = "README.md"
requires-python = ">=3.14"
authors = [
    {name = "Nicolas François Bader", email = "nicolas.bader@geo.tuwien.ac.at"}
]
license = {text = "Apache-2.0"}

dependencies = [
    "canvod-readers",
    "canvod-store",
    "canvod-vod",
    "canvod-utils",
    "xarray>=2024.1.0",
    "numpy>=1.26.0",
    "polars>=1.0.0",
    "matplotlib>=3.8.0",
    "gnssvod>=2026.2.2",
]

[project.optional-dependencies]
external = ["gnssvod"]

[tool.uv.sources]
canvod-readers = { workspace = true }
canvod-store = { workspace = true }
canvod-vod = { workspace = true }
canvod-utils = { workspace = true }

[project.urls]
Homepage = "https://github.com/nfb2021/canvodpy"
Documentation = "https://nfb2021.github.io/canvodpy/packages/audit/overview/"
Repository = "https://github.com/nfb2021/canvodpy"
Issues = "https://github.com/nfb2021/canvodpy/issues"

[build-system]
requires = ["uv_build>=0.9.17,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "canvod.audit"
