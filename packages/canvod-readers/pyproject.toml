[project]
name = "canvod-readers"
version = "0.2.3"
description = "Collection of GNSS data readers for GNSS-Transmissometry"
readme = "README.md"
requires-python = ">=3.14"
authors = [
    {name = "Nicolas François Bader", email = "nicolas.bader@geo.tuwien.ac.at"},
]
maintainers = [
    {name = "Climate and Environmental Remote Sensing (CLIMERS)", email = "nicolas.bader@geo.tuwien.ac.at"},
]
keywords = ["GNSS", "RINEX", "GPS", "geodesy", "remote sensing"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: GIS",
]
dependencies = [
    "georinex>=1.16.0",
    "matplotlib>=3.7.0",
    "natsort>=8.4.0",
    "numpy>=1.24.0",
    "pint>=0.23",
    "pydantic>=2.5.0",
    "pytz>=2023.3",
    "xarray>=2023.12.0",
    "sbf-parser>=1.0.3",
    "structlog>=24.1.0",
    "canvod-utils>=0.1.0",
    "canvod-virtualiconvname>=0.1.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.14",
    "ty>=0.0.9",
    "marimo>=0.9.0",
]

[project.urls]
Homepage = "https://github.com/nfb2021/canvodpy"
Documentation = "https://nfb2021.github.io/canvodpy/packages/readers/overview/"
Repository = "https://github.com/nfb2021/canvodpy"
Issues = "https://github.com/nfb2021/canvodpy/issues"

[build-system]
requires = ["uv_build>=0.9.17,<0.10.0"]
build-backend = "uv_build"

[tool.ty]
extend-exclude = [
    "**/docs/*.ipynb",
    "**/docs/examples.py",
]

[tool.uv.sources]
canvod-utils = { workspace = true }
canvod-virtualiconvname = { workspace = true }

[tool.uv.build-backend]
module-name = "canvod.readers"
