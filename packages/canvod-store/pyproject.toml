[project]
name = "canvod-store"
version = "0.2.3"
description = "Icechunk storage for GNSS-T observations and VOD"
authors = [
    {name = "Nicolas François Bader", email = "nicolas.bader@geo.tuwien.ac.at"},
]
maintainers = [
    {name = "Climate and Environmental Remote Sensing (CLIMERS)", email = "nicolas.bader@geo.tuwien.ac.at"},
]
readme = "README.md"
requires-python = ">=3.14"
keywords = ["GNSS", "VOD", "storage", "icechunk", "zarr"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
]

dependencies = [
    "canvod-grids>=0.1.0",
    "canvod-utils>=0.1.0",
    "canvod-vod>=0.1.0",
    "canvod-auxiliary>=0.1.0",
    "canvod-readers>=0.1.0",
    "icechunk>=1.1.5",
    "zarr>=3.1.2",
    "xarray>=2023.12.0",
    "polars>=1.0.0",
    "numpy>=1.24.0",
    "networkx>=3.6.1",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.14",
    "ty>=0.0.9",
]

[tool.uv.sources]
canvod-grids = { workspace = true }
canvod-utils = { workspace = true }
canvod-vod = { workspace = true }
canvod-auxiliary = { workspace = true }
canvod-readers = { workspace = true }

[project.urls]
Homepage = "https://github.com/nfb2021/canvodpy"
Documentation = "https://nfb2021.github.io/canvodpy/packages/store/overview/"
Repository = "https://github.com/nfb2021/canvodpy"
Issues = "https://github.com/nfb2021/canvodpy/issues"

[build-system]
requires = ["uv_build>=0.9.17,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "canvod.store"

[tool.ruff]
line-length = 88
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--strict-markers",
    "--tb=short",
    "--disable-warnings",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
]
