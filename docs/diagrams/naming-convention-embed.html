<style>
  html  { margin: 0; padding: 0; overflow: hidden; }  /* background set by JS from parent */
  body  { margin: 0; padding: 0; background: transparent; }
  svg { display: block; width: 100%; height: auto; }

  /* Light mode (default) */
  .lt      { fill: #1b4332; }
  .fn      { fill: #52b788; }
  .lgd     { fill: #74c69d; }

  /* Dark mode — triggered by data-scheme="dark" on <html>
     (set by JS below, synced from parent MkDocs Material theme
      or from OS prefers-color-scheme as fallback) */
  html[data-scheme="dark"] .lt       { fill: #b7e4c7; }
  html[data-scheme="dark"] .fn       { fill: #74c69d; }
  html[data-scheme="dark"] .lgd      { fill: #95d5b2; }
  html[data-scheme="dark"] .box-body { fill: rgba(20, 44, 32, 0.92) !important; }
  html[data-scheme="dark"] .btext    { fill: #c4d7a4 !important; }
  html[data-scheme="dark"] .grp      { stroke: #52b788 !important; }
</style>
<script>
  // Sync theme and background color from parent MkDocs Material.
  // MkDocs Material drives dark mode via data-md-color-scheme="slate" on <html>,
  // NOT via the OS prefers-color-scheme, so a CSS @media query in the iframe
  // never fires when the user toggles the site theme.
  function applyScheme() {
    var dark = false;
    try {
      var parentHtml = window.parent.document.documentElement;
      var scheme = parentHtml.getAttribute('data-md-color-scheme');
      dark = (scheme === 'slate');

      // Read the COMPUTED background-color (a resolved rgb() value, not a CSS var
      // reference) so the iframe can use it directly.  Fall through ancestors until
      // we find a non-transparent value.
      var bg = '';
      var candidates = [window.parent.document.body, parentHtml];
      for (var i = 0; i < candidates.length; i++) {
        var c = window.parent.getComputedStyle(candidates[i]).backgroundColor;
        if (c && c !== 'rgba(0, 0, 0, 0)' && c !== 'transparent') { bg = c; break; }
      }
      document.documentElement.style.background = bg || (dark ? '#0d0d0d' : '#e1e6b9');
    } catch(e) {
      // Cross-origin fallback: use OS preference
      dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.style.background = dark ? '#0d0d0d' : '#e1e6b9';
    }
    document.documentElement.setAttribute('data-scheme', dark ? 'dark' : 'light');
  }

  applyScheme();

  // React to theme toggle without page reload
  try {
    var obs = new MutationObserver(applyScheme);
    obs.observe(window.parent.document.documentElement,
                { attributes: true, attributeFilter: ['data-md-color-scheme'] });
  } catch(e) {
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyScheme);
  }
</script>
